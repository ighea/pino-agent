services:
  dev:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: pino-dev
    working_dir: /code
    volumes:
      - .:/code
      - pino-venv:/code/.venv
      - user-home:/home/dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_HOST: "http://host.docker.internal:11434"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OPENAI_BASE_URL: "http://host.docker.internal:11434/v1"
      OPENAI_API_KEY: "ollama"
      OPENAI_MODEL: "gemma4:e4b"
      BRAVE_API_KEY: "${BRAVE_API_KEY:-}"
      OPENWEATHERMAP_API_KEY: "${OPENWEATHERMAP_API_KEY:-}"
      MATRIX_HOMESERVER: "${MATRIX_HOMESERVER:-}"
      MATRIX_USER: "${MATRIX_USER:-}"
      MATRIX_PASSWORD: "${MATRIX_PASSWORD:-}"
      MATRIX_ROOM_IDS: "${MATRIX_ROOM_IDS:-}"
      MATRIX_STORE_PATH: "/code/data/nio_store"
      HTTP_API_KEY: "${HTTP_API_KEY:-}"
      AIDER_CONFIG: /code/aider.json
      AGENT_TZ: "${AGENT_TZ:-UTC}"
      RUN_MODE: "${RUN_MODE:-bash}"
    # RUN_MODE=bash (default): idle shell, `docker compose exec dev bash` or
    #   `docker compose exec dev /code/pino` to run the agent ad hoc.
    # RUN_MODE=pino: container's main process is the agent itself, e.g.
    #   `RUN_MODE=pino docker compose up -d`. Still exec-able with bash.
    command: ["bash", "-c", "if [ \"$$RUN_MODE\" = \"pino\" ]; then exec /code/pino; else exec bash; fi"]
    stdin_open: true
    tty: true

volumes:
  pino-venv:
  user-home:
